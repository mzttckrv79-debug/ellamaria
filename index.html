<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apps by Ella Maria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f8f4f2;
font-family:'Inter',sans-serif;
color:#2f2f2f;
display:flex;
justify-content:center;
padding:60px 20px;
}

.container{
width:100%;
max-width:900px;
}

.hero{
text-align:center;
margin-bottom:55px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:52px;
font-weight:700;
letter-spacing:.5px;
margin-bottom:12px;
}

.hero p{
font-size:18px;
color:#8f8983;
line-height:1.6;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;
}

.card{
background:#fbf8f5;
border:1px solid #ece7e1;
border-radius:24px;
padding:32px;
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 18px 40px rgba(0,0,0,.06);
}

.card h2{
font-family:'Playfair Display',serif;
font-size:30px;
margin-bottom:20px;
}

.link{
display:block;
text-decoration:none;
background:#ede9e4;
color:#222;
padding:15px 18px;
border-radius:14px;
margin-top:12px;
font-weight:500;
transition:.2s;
}

.link:hover{
background:#cdb89f;
}

footer{
text-align:center;
margin-top:70px;
color:#8f8983;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">

<h1>Ella Maria Apps</h1>

<p>
Beautiful, thoughtfully designed apps that help you stay organized,
create with intention, and simplify everyday life.
</p>

</div>

<div class="grid">

<div class="card">

<h2>Contelle</h2>

<a class="link" href="contelle-privacy.html">Privacy Policy</a>

<a class="link" href="contelle-support.html">Support</a>

</div>

<div class="card">

<h2>Planozy</h2>

<a class="link" href="planozy-privacy.html">Privacy Policy</a>

<a class="link" href="planozy-support.html">Support</a>

</div>

</div>

<footer>

</footer>

</div>

</body>
</html>
